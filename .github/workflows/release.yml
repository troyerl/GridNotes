# Build GridNotes release assets when a version tag is pushed.
# Tags with a hyphen (e.g. v1.0.35-rc1) are published as GitHub pre-releases so
# installed apps still see the previous full release as "latest" for updates.
# See docs/RELEASES.md.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libglib2.0-0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build installer
        shell: pwsh
        run: scripts/build_installer.ps1

      - name: Verify tests are not bundled
        shell: pwsh
        run: |
          $bundleRoot = Join-Path $env:GITHUB_WORKSPACE "dist\GridNotes"
          if (-not (Test-Path $bundleRoot)) {
            throw "Expected PyInstaller output at $bundleRoot"
          }
          if (Test-Path (Join-Path $bundleRoot "tests")) {
            throw "tests/ must not be included in the installer bundle"
          }
          $testArtifacts = Get-ChildItem -Path $bundleRoot -Recurse -Include @(
            "test_*.py",
            "conftest.py",
            "pytest.ini"
          ) -ErrorAction SilentlyContinue
          if ($testArtifacts) {
            throw ("Test artifacts must not be bundled: " + ($testArtifacts.FullName -join ", "))
          }

      - name: Upload Windows assets
        uses: actions/upload-artifact@v5
        with:
          name: windows-release
          path: |
            dist/GridNotes-Windows.zip
            dist/GridNotes-Setup.exe
          if-no-files-found: warn

  build-macos:
    needs: test
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify Apple Silicon runner
        run: |
          if [ "$(uname -m)" != "arm64" ]; then
            echo "Expected arm64 macOS runner"
            exit 1
          fi

      - name: Build macOS app
        run: bash scripts/build_macos.sh

      - name: Upload macOS asset
        uses: actions/upload-artifact@v5
        with:
          name: macos-release
          path: dist/GridNotes-macOS-AppleSilicon.zip
          if-no-files-found: error

  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Windows assets
        uses: actions/download-artifact@v5
        with:
          name: windows-release
          path: release-assets

      - name: Download macOS asset
        uses: actions/download-artifact@v5
        with:
          name: macos-release
          path: release-assets

      - name: Extract release notes from RELEASE_NOTES.md
        run: python scripts/extract_release_notes.py "${{ github.ref_name }}" -o release_body.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_body.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-assets/*
          fail_on_unmatched_files: false
          generate_release_notes: false
